<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Curator - Fullscreen Preview</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed": "#c9e7f7",
                        "surface-dim": "#d1dce0",
                        "primary-fixed-dim": "#bfd5ff",
                        "on-primary-container": "#37527d",
                        "primary-dim": "#38537e",
                        "surface-tint": "#445f8a",
                        "surface-variant": "#dbe4e7",
                        "tertiary-dim": "#51516c",
                        "outline": "#737c7f",
                        "background": "#f8f9fa",
                        "error-container": "#fe8983",
                        "on-secondary-fixed-variant": "#435f6d",
                        "on-secondary-fixed": "#264350",
                        "on-error-container": "#752121",
                        "on-background": "#2b3437",
                        "on-primary-fixed": "#234069",
                        "inverse-on-surface": "#9b9d9e",
                        "on-tertiary-fixed": "#373851",
                        "secondary-fixed-dim": "#bbd9e9",
                        "on-primary-fixed-variant": "#415c87",
                        "tertiary-fixed-dim": "#cbc9e9",
                        "surface-container-highest": "#dbe4e7",
                        "on-tertiary": "#fbf7ff",
                        "error": "#9f403d",
                        "primary-container": "#d6e3ff",
                        "surface-container-low": "#f1f4f6",
                        "surface-container-high": "#e3e9ec",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#0c0f10",
                        "tertiary-container": "#d9d7f8",
                        "primary": "#445f8a",
                        "on-surface": "#2b3437",
                        "on-secondary": "#f3faff",
                        "surface-bright": "#f8f9fa",
                        "primary-fixed": "#d6e3ff",
                        "surface-container": "#eaeff1",
                        "on-tertiary-container": "#4a4a65",
                        "error-dim": "#4e0309",
                        "tertiary-fixed": "#d9d7f8",
                        "tertiary": "#5d5d78",
                        "on-tertiary-fixed-variant": "#54546f",
                        "on-surface-variant": "#586064",
                        "inverse-primary": "#b2cdff",
                        "surface": "#f8f9fa",
                        "secondary-container": "#c9e7f7",
                        "on-error": "#fff7f6",
                        "on-primary": "#f6f7ff",
                        "outline-variant": "#abb3b7",
                        "secondary-dim": "#3a5764",
                        "on-secondary-container": "#395663",
                        "secondary": "#466370"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .bg-preview-overlay {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0) 20%, rgba(0, 0, 0, 0) 80%, rgba(0, 0, 0, 0.6) 100%);
        }

        .glass-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-black text-white font-body selection:bg-primary/30 overflow-hidden">
    <!-- Main Fullscreen Viewport -->
    <main class="relative h-screen w-full flex items-center justify-center overflow-hidden bg-black">
        <!-- Immersive Image Layer -->
        <div class="absolute inset-0 z-0">
            <img alt="Preview Image" class="w-full h-full object-contain"
                data-alt="Dramatic architectural shadow on a white minimalist building"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBUT4fKMQZfGA2FRpztLNoD-4pJV4-dMPASmNBa9HfYeTeQm_ZdS28LhUOVF-uVo3xcBcDZB_00afqVms2CWO_a7UVCZvL0YW_9Of-K5jP3pcUiPwp39cwpGxn6a3dFwyppsdLvCuHu7B1phuP0NIf5_VKUrmIxizM-3XZQaa0L4RJX1vgrZQqHXjXS83IIkaI6g5tw4Diy5hgmqzPwuagOGIMw_KpIqY2BgklyZYspNWZVaTO0Ky-5VzfGJdHR1GyF_n6qAZonaw" />
        </div>
        <!-- Tonal Overlay Gradients for UI Legibility -->
        <div class="absolute inset-0 z-10 bg-preview-overlay pointer-events-none"></div>
        <!-- Top Navigation Bar (Shared Component Style Mapping) -->
        <header class="fixed top-0 left-0 w-full z-20 flex justify-between items-center px-6 h-20 pt-4 bg-transparent">
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 glass-blur text-white active:scale-90 transition-transform">
                <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            </button>
            <div class="flex flex-col items-center">
                <span class="font-headline font-bold text-sm tracking-tight">August 14, 2023</span>
                <span class="font-label text-[10px] text-white/60">11:42 AM • SAN FRANCISCO</span>
            </div>
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 glass-blur text-white active:scale-90 transition-transform">
                <span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
            </button>
        </header>
        <!-- Bottom Action Bar -->
        <footer class="fixed bottom-0 left-0 w-full z-20 flex flex-col items-center gap-6 pb-10">
            <!-- Swipe Indicators -->
            <div class="flex gap-1.5 items-center">
                <div class="w-1.5 h-1.5 rounded-full bg-white/30"></div>
                <div class="w-2 h-2 rounded-full bg-white"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-white/30"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-white/30"></div>
            </div>
            <!-- Contextual Actions Container -->
            <nav
                class="flex items-center justify-center gap-10 px-8 py-4 bg-black/30 glass-blur rounded-[2rem] border border-white/10 shadow-2xl">
                <button class="flex flex-col items-center gap-1 group">
                    <span class="material-symbols-outlined text-white/80 group-active:scale-90 transition-transform"
                        data-icon="favorite">favorite</span>
                    <span class="text-[9px] font-medium tracking-widest text-white/50 uppercase">Like</span>
                </button>
                <button class="flex flex-col items-center gap-1 group">
                    <span class="material-symbols-outlined text-white/80 group-active:scale-90 transition-transform"
                        data-icon="info">info</span>
                    <span class="text-[9px] font-medium tracking-widest text-white/50 uppercase">Info</span>
                </button>
                <button class="flex flex-col items-center gap-1 group">
                    <span class="material-symbols-outlined text-white/80 group-active:scale-90 transition-transform"
                        data-icon="share">share</span>
                    <span class="text-[9px] font-medium tracking-widest text-white/50 uppercase">Send</span>
                </button>
                <button class="flex flex-col items-center gap-1 group">
                    <span
                        class="material-symbols-outlined text-error-container group-active:scale-90 transition-transform"
                        data-icon="delete">delete</span>
                    <span class="text-[9px] font-medium tracking-widest text-error-container/70 uppercase">Bin</span>
                </button>
            </nav>
        </footer>
        <!-- Hidden Canvas Grid Metadata (Invisible but maintains hierarchy context) -->
        <div class="sr-only">
            <h1>Previewing Artwork: The Digital Curator</h1>
            <p>Viewing item from "All" category.</p>
        </div>
    </main>
    <!-- Visual Edge Feedback (Left/Right swipe zone cues) -->
    <div class="fixed inset-y-0 left-0 w-4 z-10 pointer-events-none bg-gradient-to-r from-black/20 to-transparent">
    </div>
    <div class="fixed inset-y-0 right-0 w-4 z-10 pointer-events-none bg-gradient-to-l from-black/20 to-transparent">
    </div>
</body>

</html>
